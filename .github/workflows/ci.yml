name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Prevent spiceypy source builds from trying to download CSPICE from NAIF in CI.
  PIP_ONLY_BINARY: spiceypy

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"
      - name: Run tests
        run: pytest -q
      - name: Validate plugin packages
        run: python scripts/validate_plugin_packages.py
      - name: Run MCP list-tools smoke
        run: python scripts/smoke_mcp_list_tools.py --json
      - name: Run MCP resource smoke
        run: python scripts/smoke_mcp_resources.py --json
      - name: Check MCP surface contract (base/compat/datasource profiles)
        # One invocation checks all three env-gated profiles against the
        # checked-in snapshots in tests/contracts/mcp_surface/ and fails with a
        # readable unified diff on drift. This lane installs no [analysis] extra,
        # so it captures exactly the base-install surface those snapshots pin.
        run: python scripts/check_mcp_surface_contract.py
      - name: Run analysis-bundle provenance smoke
        run: python scripts/smoke_analysis_bundle.py --json

  analysis:
    # Real-backend lane: installs the optional [analysis] extra (pyspedas>=2.0,
    # matplotlib) so particle/coordinate tests exercise real pyspedas algorithms
    # and plotting tests exercise the real Agg renderer instead of skipping.
    # All analysis tests use synthetic, in-memory data and never download remote
    # data, so this lane stays network-free and stable.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies (with analysis extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[analysis,dev,mcp]"
      - name: Show pyspedas build
        run: python -c "import pyspedas, importlib.metadata as m; print('pyspedas', m.version('pyspedas'))"
      - name: Run analysis import/list-tools smoke
        run: python scripts/smoke_analysis_imports.py --json
      - name: Run analysis MCP list-tools smoke
        run: python scripts/smoke_mcp_list_tools.py --json
      - name: Run analysis MCP resource smoke
        run: python scripts/smoke_mcp_resources.py --json
      - name: Run particle real-backend tests (#18, #19, incl. pitch-angle)
        run: pytest -q tests/test_analysis_particles.py
      - name: Run coordinate-transform real-backend tests
        run: pytest -q tests/test_analysis_coords.py
      - name: Run plotting render tests (#20, incl. real Agg PNG round-trip)
        run: pytest -q tests/test_analysis_plotting.py

  wheel:
    # Distribution-artifact lane (#209): prove the project builds to a wheel +
    # sdist and is usable from a clean install of that wheel — not just from an
    # editable `pip install -e .` source checkout. This is what catches missing
    # package data, undeclared runtime dependencies, and broken console entry
    # points that the editable-install lanes above cannot see. The install pulls
    # only base dependencies (no optional science extras) and the smoke is
    # network-free: it never downloads CDAWeb/PDS data or SPICE kernels.
    #
    # Runs on an OS matrix so the built-wheel clean-install evidence covers both
    # Linux and macOS. fail-fast is disabled so a failure on one OS still lets the
    # other OS report its own result.
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build wheel and sdist from a clean checkout
        run: python -m build --outdir dist
      - name: Check artifacts with standard packaging tooling
        run: twine check dist/*
      - name: Create a clean venv and install the built wheel (not -e ., not src)
        run: |
          python -m venv "$RUNNER_TEMP/spedas-agent-kit-wheel-venv"
          "$RUNNER_TEMP/spedas-agent-kit-wheel-venv/bin/python" -m pip install --upgrade pip
          # Install the built wheel by artifact path: base dependencies only, no
          # optional extras, no source tree. The glob resolves to the single wheel.
          "$RUNNER_TEMP/spedas-agent-kit-wheel-venv/bin/python" -m pip install dist/*.whl
      - name: Smoke-test the installed wheel (entry point + packaged resources)
        # Runs the installed console entry point over MCP stdio and verifies the
        # canonical base tools plus packaged skills/schemas/presets are readable.
        # Fails loudly if package data, dependencies, or the entry point are broken.
        run: >-
          "$RUNNER_TEMP/spedas-agent-kit-wheel-venv/bin/python" scripts/smoke_installed_artifact.py
          --repo-root "$GITHUB_WORKSPACE" --timeout-seconds 60 --json
      - name: Assert base wheel startup loads no optional heavy backends (#209)
        # In-process, no-write/no-download companion smoke in the SAME clean base
        # wheel venv: import the package, start + list the base server, and fail
        # if pyspedas/matplotlib/pywt/hapiclient/mth5/obspy were imported. Kept
        # separate from the cleanup-bearing smokes above. PYTHONDONTWRITEBYTECODE
        # keeps the run from writing __pycache__ into the installed site-packages.
        run: >-
          PYTHONDONTWRITEBYTECODE=1
          "$RUNNER_TEMP/spedas-agent-kit-wheel-venv/bin/python" scripts/smoke_base_imports.py
          --repo-root "$GITHUB_WORKSPACE" --json
      - name: Create a clean venv and install the built wheel with the [analysis] extra
        # Analysis-profile artifact witness (#209): prove the SAME already-built
        # wheel — installed through its declared [analysis] extra — resolves the
        # optional analysis stack (pyspedas/matplotlib/PyWavelets) and exposes the
        # canonical analysis tools. The base wheel lane above and the editable
        # `analysis` job each pass separately; only this step composes them, so a
        # wheel whose [analysis] extra is undeclared/unresolvable would be caught.
        # Distinct from spedas-agent-kit-wheel-venv; installs the exact local wheel
        # via an unambiguous PEP 508 direct reference with the [analysis] extra —
        # never `.`, `-e .`, `dist/*.tar.gz`, a rebuilt wheel, or a hand-maintained
        # dependency list. Ubuntu-only: the smokes below assume POSIX venv/entry-point
        # layout.
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m venv "$RUNNER_TEMP/spedas-agent-kit-analysis-wheel-venv"
          "$RUNNER_TEMP/spedas-agent-kit-analysis-wheel-venv/bin/python" -m pip install --upgrade pip
          # Require exactly one built wheel; never silently pick the first of many.
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ "${#wheels[@]}" -ne 1 ]; then
            echo "expected exactly one dist/*.whl, found ${#wheels[@]}: ${wheels[*]}" >&2
            exit 1
          fi
          # Install the exact wheel as an unambiguous PEP 508 direct reference with
          # the [analysis] extra, so pip resolves the wheel's own declared analysis
          # optional-dependencies from this exact artifact (never a separate
          # `pip install pyspedas`). The file:// URI comes from the absolute path.
          wheel_uri="$(python -c 'import sys, pathlib; print(pathlib.Path(sys.argv[1]).resolve().as_uri())' "${wheels[0]}")"
          "$RUNNER_TEMP/spedas-agent-kit-analysis-wheel-venv/bin/python" -m pip install "spedas-agent-kit[analysis] @ ${wheel_uri}"
      - name: Smoke-test the installed analysis wheel (base metadata/entry point/resources)
        # Reuse the base installed-artifact probe against the analysis-wheel venv so
        # installed location, metadata/version agreement, entry point, base tools,
        # and packaged resources stay validated when the analysis extra is present.
        # The probe permits a tool superset, so it is satisfied by the larger
        # analysis surface; the analysis-specific tool assertion is the next step.
        if: matrix.os == 'ubuntu-latest'
        run: >-
          "$RUNNER_TEMP/spedas-agent-kit-analysis-wheel-venv/bin/python" scripts/smoke_installed_artifact.py
          --repo-root "$GITHUB_WORKSPACE" --timeout-seconds 60 --json
      - name: Assert installed analysis wheel registers every canonical analysis tool (#209)
        # Installed-only analysis witness in the SAME analysis-wheel venv: fail if
        # spedas_agent_kit imports from <checkout>/src, require every canonical
        # analysis import to succeed from the wheel's [analysis] closure, build the
        # real default server with NORMAL auto-detection (no forced
        # include_analysis_tools), and require every ANALYSIS_TOOL_NAMES member in
        # list_tools() — the expected list read from the installed package, not
        # hand-copied. In-process, network-free: no data fetch or kernel download.
        if: matrix.os == 'ubuntu-latest'
        run: >-
          "$RUNNER_TEMP/spedas-agent-kit-analysis-wheel-venv/bin/python" scripts/smoke_installed_analysis.py
          --repo-root "$GITHUB_WORKSPACE" --json
      - name: Create a clean venv and install the built sdist (not ., not -e ., not the wheel)
        # Second clean-install witness for the OTHER built artifact type: the
        # source distribution. `twine check` above validates sdist metadata but
        # never asks pip to build+install dist/*.tar.gz, so a broken source-archive
        # inclusion set (missing package data or undeclared deps) can slip through
        # while the checkout and the separately built wheel both pass. This venv is
        # distinct from spedas-agent-kit-wheel-venv and installs the explicit tarball
        # path only — never `.`, `-e .`, or dist/*.whl — so the installed result is
        # derived from the sdist. --no-cache-dir avoids reusing pip's cached project
        # wheel. Ubuntu-only: the smokes below assume POSIX venv/entry-point layout.
        if: matrix.os == 'ubuntu-latest'
        run: |
          python -m venv "$RUNNER_TEMP/spedas-agent-kit-sdist-venv"
          "$RUNNER_TEMP/spedas-agent-kit-sdist-venv/bin/python" -m pip install --upgrade pip
          # Install the built sdist by artifact path so pip runs its isolated
          # PEP 517 build of the tarball. The glob resolves to the single sdist.
          "$RUNNER_TEMP/spedas-agent-kit-sdist-venv/bin/python" -m pip install --no-cache-dir dist/*.tar.gz
      - name: Smoke-test the installed sdist build (entry point + packaged resources)
        # Reuses the installed-artifact probe against the sdist-derived install:
        # runs the installed console entry point over MCP stdio and verifies the
        # canonical base tools plus packaged skills/schemas/presets are readable.
        # Fails loudly if the source archive omitted package data, dependencies, or
        # the entry point. The probe is install-origin-neutral; the explicit tarball
        # install command above is what makes this an sdist witness.
        if: matrix.os == 'ubuntu-latest'
        run: >-
          "$RUNNER_TEMP/spedas-agent-kit-sdist-venv/bin/python" scripts/smoke_installed_artifact.py
          --repo-root "$GITHUB_WORKSPACE" --timeout-seconds 60 --json
      - name: Assert base sdist startup loads no optional heavy backends (#209)
        # In-process, no-write/no-download companion smoke in the SAME clean base
        # sdist venv: import the package, start + list the base server, and fail
        # if pyspedas/matplotlib/pywt/hapiclient/mth5/obspy were imported.
        # PYTHONDONTWRITEBYTECODE keeps the run from writing __pycache__ into the
        # installed site-packages.
        if: matrix.os == 'ubuntu-latest'
        run: >-
          PYTHONDONTWRITEBYTECODE=1
          "$RUNNER_TEMP/spedas-agent-kit-sdist-venv/bin/python" scripts/smoke_base_imports.py
          --repo-root "$GITHUB_WORKSPACE" --json
